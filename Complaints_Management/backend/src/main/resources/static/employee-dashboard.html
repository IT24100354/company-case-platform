<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard - CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="bg-light">

<nav class="sidebar">
    <div class="sidebar-brand">Corporate Portal</div>
    <div class="sidebar-nav">
        <a class="nav-link-item active" href="employee-dashboard.html"><i class="bi bi-grid"></i> Dashboard</a>
        <a class="nav-link-item" href="profile.html"><i class="bi bi-person-circle"></i> Profile</a>
        <a class="nav-link-item" href="communication.html"><i class="bi bi-chat-dots"></i> Communication</a>
        <a class="nav-link-item" href="login.html" onclick="sessionStorage.clear()" style="color:var(--clr-danger)"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="main-wrapper" style="margin-left: 260px; padding: 2rem;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 id="welcomeText">Dashboard</h2>
            <p class="text-muted" id="companyName">Loading company info...</p>
        </div>
        <div class="d-flex gap-3 align-items-center">
            <!-- Notification Bell -->
            <div class="dropdown">
                <button class="btn btn-white border shadow-sm position-relative" style="border-radius:12px; padding: 10px 14px; background:#fff" data-bs-toggle="dropdown">
                    <i class="bi bi-bell"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notif-badge" style="display:none">0</span>
                </button>
                <div class="dropdown-menu dropdown-menu-end notif-dropdown shadow-lg">
                    <div class="notif-header">
                        <span class="fw-bold">Notifications</span>
                        <button class="btn btn-sm btn-link text-primary p-0 fw-bold small text-decoration-none" onclick="markAllRead()">Mark all as read</button>
                    </div>
                    <div class="notif-list" id="notif-list">
                        <!-- Items via JS -->
                    </div>
                </div>
            </div>
            <button class="btn btn-primary shadow-sm" style="border-radius:10px; padding: 10px 20px;" onclick="window.location.href='complaint-form.html'">
                <i class="bi bi-plus-lg me-1"></i> New Internal Complaint
            </button>
        </div>
    </div>

    <div class="cms-card">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Case ID</th>
                    <th>Category</th>
                    <th>Date Submitted</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="complaintTable">
                <tr><td colspan="6" class="text-center">Loading your history...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/data-store.js"></script>
<script>
    const session = CMS.requireAuth(['employee']);
    let notifications = [];

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('welcomeText').innerText = `Welcome, ${session.fullName}`;
        document.getElementById('companyName').innerText = session.companyName || 'Corporate Division';
        loadComplaints();
        loadNotifications();
        CMS.pollUnreadCounts();
        setInterval(loadNotifications, 30000);
    });

    async function loadComplaints() {
        const res = await fetch(`/api/complaints?userId=${session.id}`);
        const data = await res.json();
        const tbody = document.getElementById('complaintTable');
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-5"><i class="bi bi-inbox d-block fs-1 mb-2 opacity-25"></i>No complaints found.</td></tr>';
            return;
        }
        tbody.innerHTML = '';

        data.forEach(c => {
            let actionBtn = '';
            const uStatus = (c.status || '').toUpperCase();
            
            if (uStatus === 'PENDING') {
                actionBtn = `<button class="btn btn-sm btn-warning fw-bold px-3" style="border-radius:8px" onclick="editEvidence(${c.id}, false)"><i class="bi bi-pencil-square me-1"></i> Edit Evidence</button>`;
            } else if (uStatus === 'MORE_INFO_REQUIRED') {
                actionBtn = `<button class="btn btn-sm btn-danger fw-bold px-3" style="border-radius:8px" onclick="editEvidence(${c.id}, true)"><i class="bi bi-plus-circle me-1"></i> Add More Evidence</button>`;
            } else if (uStatus === 'RESOLVED') {
                actionBtn = `<button class="btn btn-sm btn-success fw-bold px-3" style="border-radius:8px" onclick="viewResolution(${c.id})"><i class="bi bi-shield-check me-1"></i> View Resolution</button>`;
            } else {
                actionBtn = `<button class="btn btn-sm btn-outline-primary fw-bold px-3" style="border-radius:8px" onclick="viewDetails(${c.id})"><i class="bi bi-eye"></i> View Details</button>`;
            }

            tbody.innerHTML += `
                <tr>
                    <td><span class="fw-bold text-primary">CMP-${String(c.id).padStart(3,'0')}</span></td>
                    <td>${c.category || 'General'}</td>
                    <td class="small text-muted">${new Date(c.createdAt).toLocaleDateString(undefined, {year:'numeric', month:'short', day:'numeric'})}</td>
                    <td>${CMS.statusBadge(c.status)}</td>
                    <td><div class="d-flex gap-2">${actionBtn}</div></td>
                </tr>
            `;
        });
    }

    function editEvidence(id) {
        window.location.href = `complaint-form.html?id=${id}&edit=true`;
    }

    function viewDetails(id) {
        window.location.href = `complaint-view.html?id=${id}`;
    }

    function viewResolution(id) {
        window.location.href = `complaint-view.html?id=${id}#resolution`;
    }

    async function loadNotifications() {
        try {
            const resp = await fetch(`/api/notifications?userId=${session.id}`);
            if (resp.ok) {
                notifications = await resp.json();
                renderNotifications();
            }
        } catch (e) { console.error(e); }
    }

    function renderNotifications() {
        const list = document.getElementById('notif-list');
        const unreadCount = notifications.filter(n => !n.read).length;
        
        const badge = document.getElementById('notif-badge');
        badge.textContent = unreadCount;
        badge.style.display = unreadCount > 0 ? 'block' : 'none';

        if (notifications.length === 0) {
            list.innerHTML = `<div class="p-4 text-center text-muted small">No notifications found</div>`;
            return;
        }

        list.innerHTML = notifications.slice(0, 10).map(n => `
            <div class="notif-item ${!n.read ? 'unread' : ''}" onclick="markRead(${n.id})">
                <div class="notif-icon"><i class="bi bi-broadcast"></i></div>
                <div class="flex-grow-1">
                    <div class="fw-bold small" style="font-size:0.8rem">${n.title || 'Announcement'}</div>
                    <div class="text-muted" style="font-size: 0.75rem; line-height:1.2">${n.message}</div>
                    <div class="text-muted small mt-1" style="font-size: 0.65rem;">${new Date(n.createdAt).toLocaleDateString()}</div>
                </div>
            </div>
        `).join('');
    }

    async function markRead(id) {
        await fetch(`/api/notifications/${id}/read`, { method: 'POST' });
        loadNotifications();
    }

    async function markAllRead() {
        await fetch(`/api/notifications/read-all?userId=${session.id}`, { method: 'POST' });
        loadNotifications();
    }
</script>
</body>
</html>
