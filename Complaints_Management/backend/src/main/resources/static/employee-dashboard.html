<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard - CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="bg-light">

<nav class="sidebar">
    <div class="sidebar-brand">Corporate Portal</div>
    <div class="sidebar-nav">
        <a class="nav-link-item active" href="employee-dashboard.html"><i class="bi bi-grid"></i> Dashboard</a>
        <a class="nav-link-item" href="profile.html"><i class="bi bi-person-circle"></i> Profile</a>
        <a class="nav-link-item" href="communication.html"><i class="bi bi-chat-dots"></i> Communication</a>
        <a class="nav-link-item" href="login.html" onclick="sessionStorage.clear()" style="color:var(--clr-danger)"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="main-wrapper" style="margin-left: 260px; padding: 2rem;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 id="welcomeText">Dashboard</h2>
            <p class="text-muted" id="companyName">Loading company info...</p>
        </div>
        <button class="btn btn-primary" onclick="window.location.href='complaint-form.html'">New Internal Complaint</button>
    </div>

    <div class="cms-card">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Topic</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Submitted</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="complaintTable">
                <tr><td colspan="6" class="text-center">Loading your history...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="assets/data-store.js"></script>
<script>
    const session = CMS.requireAuth(['employee']);

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('welcomeText').innerText = `Welcome, ${session.fullName}`;
        document.getElementById('companyName').innerText = session.companyName || 'Corporate Division';
        loadComplaints();
    });

    async function loadComplaints() {
        const res = await fetch(`/api/complaints?userId=${session.id}`);
        const data = await res.json();
        const tbody = document.getElementById('complaintTable');
        tbody.innerHTML = data.length ? '' : '<tr><td colspan="5" class="text-center text-muted">No complaints found.</td></tr>';

        data.forEach(c => {
            const statusStyle = c.status === 'RESOLVED' ? 'background:#16a34a' : 'background:#2563eb';
            tbody.innerHTML += `
                <tr>
                    <td>#${c.id}</td>
                    <td>${c.title}</td>
                    <td>${c.category}</td>
                    <td><span class="badge" style="${statusStyle}">${c.status}</span></td>
                    <td>${new Date(c.createdAt).toLocaleDateString()}</td>
                    <td>
                        ${c.status === 'PENDING' ? `<button class="btn btn-sm btn-outline-primary" onclick="editComplaint(${c.id})"><i class="bi bi-pencil"></i> Edit</button>` : '—'}
                    </td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
