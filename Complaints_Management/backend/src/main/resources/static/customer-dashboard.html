<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="bg-light">

<nav class="sidebar">
    <div class="sidebar-brand">Customer Portal</div>
    <div class="sidebar-nav">
        <a class="nav-link-item active" href="customer-dashboard.html"><i class="bi bi-grid"></i> Dashboard</a>
        <a class="nav-link-item" href="profile.html"><i class="bi bi-person-circle"></i> Profile</a>
        <a class="nav-link-item" href="communication.html"><i class="bi bi-chat-dots"></i> Communication</a>
        <a class="nav-link-item" href="login.html" onclick="sessionStorage.clear()" style="color:var(--clr-danger)"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="main-wrapper" style="margin-left: 260px; padding: 2rem;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>My Complaints</h2>
        <button class="btn btn-primary" onclick="window.location.href='complaint-form.html'">New Complaint</button>
    </div>

    <div class="cms-card">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Case ID</th>
                    <th>Title</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="complaintTable">
                <tr><td colspan="6" class="text-center">Loading your cases...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="assets/data-store.js"></script>
<script>
    const session = CMS.requireAuth(['customer']);

    document.addEventListener("DOMContentLoaded", loadComplaints);

    async function loadComplaints() {
        try {
            const res = await fetch(`/api/complaints?userId=${session.id}`);
            const data = await res.json();
            const tbody = document.getElementById('complaintTable');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">You haven\'t submitted any complaints yet.</td></tr>';
                return;
            }

            data.forEach(c => {
                const badge = `<span class="badge" style="background:${getStatusColor(c.status)}">${c.status}</span>`;
                tbody.innerHTML += `
                    <tr>
                        <td>#CMP-${c.id}</td>
                        <td>${c.title}</td>
                        <td>${c.companyName || 'N/A'}</td>
                        <td>${badge}</td>
                        <td>${new Date(c.createdAt).toLocaleDateString()}</td>
                        <td>
                            ${c.status === 'PENDING' ? `<button class="btn btn-sm btn-outline-primary" onclick="editComplaint(${c.id})"><i class="bi bi-pencil"></i> Edit</button>` : '—'}
                        </td>
                    </tr>
                `;
            });
        } catch (e) { console.error(e); }
    }

    function getStatusColor(s) {
        if (s === 'PENDING') return '#64748b';
        if (s === 'APPROVED' || s === 'IN_PROGRESS') return '#2563eb';
        if (s === 'RESOLVED') return '#16a34a';
        return '#e11d48';
    }
</script>
</body>
</html>
