<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communication Center - CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
    <style>
        .comm-container {
            display: flex;
            height: calc(100vh - 120px);
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }

        .comm-sidebar {
            width: 350px;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: 0.2s;
        }
        .chat-item:hover, .chat-item.active { background: #f8fafc; }
        .chat-item.active { border-left: 4px solid var(--clr-primary); }

        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { flex: 1; overflow-y: auto; padding: 24px; background: #f8fafc; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 4px; }
        .msg-received { align-self: flex-start; background: #fff; border: 1px solid #e2e8f0; color: #1e293b; }
        .msg-sent { align-self: flex-end; background: var(--clr-primary); color: #fff; }

        .chat-input-area { padding: 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 12px; background: #fff; }
        .chat-input { flex: 1; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 16px; outline: none; transition: 0.2s; }
        .chat-input:focus { border-color: var(--clr-primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .btn-send { background: var(--clr-primary); color: #fff; border: none; width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; }
    </style>
</head>
<body class="bg-light">

    <nav class="sidebar">
        <div class="sidebar-brand" id="portal-brand">User Portal</div>
        <div class="sidebar-nav">
            <a class="nav-link-item" id="nav-dash" href="#"><i class="bi bi-grid"></i> Dashboard</a>
            <a class="nav-link-item" href="profile.html"><i class="bi bi-person-circle"></i> Profile</a>
            <a class="nav-link-item active" href="communication.html"><i class="bi bi-chat-dots"></i> Communication</a>
            <a class="nav-link-item" href="login.html" onclick="CMS.logout()" style="color:var(--clr-danger)"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </nav>

    <div class="main-wrapper" style="margin-left: 260px; padding: 2rem;">
        <h2 class="mb-4 fw-bold">Communication Center</h2>
        
        <div class="comm-container">
            <div class="comm-sidebar">
                <div class="p-3 border-bottom bg-light fw-bold text-muted small text-uppercase letter-spacing-1">My Cases</div>
                <div class="chat-list" id="chat-list">
                    <!-- Complaints will load here -->
                </div>
            </div>

            <div class="chat-main" id="chat-main">
                <div class="empty-state">
                    <i class="bi bi-headset mb-3" style="font-size: 3.5rem; opacity: 0.4;"></i>
                    <h5>Support Messaging</h5>
                    <p class="small">Select a complaint to talk with an Admin</p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/data-store.js"></script>
    <script>
        const session = CMS.requireAuth(['customer', 'employee']);
        let complaints = [];
        let activeChat = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const role = session.role.toUpperCase();
            document.getElementById('portal-brand').textContent = role + ' PORTAL';
            document.getElementById('nav-dash').href = (role === 'CUSTOMER' ? 'customer-dashboard.html' : 'employee-dashboard.html');
            
            await loadComplaints();
        });

        async function loadComplaints() {
            const res = await fetch(`/api/complaints?userId=${session.id}`);
            if (res.ok) {
                complaints = await res.json();
                renderChatList();
            }
        }

        function renderChatList() {
            const listEl = document.getElementById('chat-list');
            listEl.innerHTML = '';
            
            // Only show complaints that are NOT PENDING or have been approved/forwarded etc.
            // Actually, allow communication for any complaint once submitted.
            complaints.forEach(c => {
                const el = document.createElement('div');
                el.className = `chat-item ${activeChat && activeChat.id === c.id ? 'active' : ''}`;
                el.onclick = () => selectChat(c);
                el.innerHTML = `
                    <div class="d-flex justify-content-between mb-1">
                        <span class="badge bg-light text-dark shadow-xs" style="font-size:0.6rem">CMP-${String(c.id).padStart(3,'0')}</span>
                        <span class="small opacity-75" style="font-size:0.65rem">${new Date(c.createdAt).toLocaleDateString()}</span>
                    </div>
                    <div class="fw-bold text-truncate mb-1" style="font-size:0.85rem">${c.title}</div>
                    <div class="d-flex align-items-center gap-2">
                        <span class="badge" style="font-size:0.6rem; background: ${getStatusColor(c.status)}">${c.status}</span>
                        <span class="text-muted text-truncate italic" style="font-size:0.7rem">${c.companyName}</span>
                    </div>
                `;
                listEl.appendChild(el);
            });
        }

        function getStatusColor(s) {
            if (s === 'PENDING') return '#94a3b8';
            if (s === 'APPROVED' || s === 'FORWARDED') return '#3b82f6';
            if (s === 'RESOLVED') return '#10b981';
            return '#ef4444';
        }

        async function selectChat(c) {
            activeChat = c;
            renderChatList();
            await renderChatMain();
        }

        async function renderChatMain() {
            const main = document.getElementById('chat-main');
            const c = activeChat;

            const res = await fetch(`/api/admin/complaints/${c.id}/chat?userId=${session.id}`);
            let messages = [];
            if (res.ok) {
                const raw = await res.json();
                // Filter specifically for the "complainant <-> admin" channel
                messages = raw.filter(m => m.channel === 'employee');
            }

            main.innerHTML = `
                <div class="chat-header">
                    <div>
                        <div class="fw-bold">Support for Issue: ${c.title}</div>
                        <div class="small text-muted">Chatting with System Administrators</div>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadComplaints(); renderChatMain();"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
                </div>
                <div class="chat-body" id="chat-messages">
                    ${messages.length === 0 ? `
                        <div class="empty-state">
                            <i class="bi bi-chat-dots mb-2" style="font-size: 2rem; opacity: 0.3;"></i>
                            <p class="small">No messages yet. Send a message to get help.</p>
                        </div>
                    ` : messages.map(m => {
                        const isMe = String(m.senderId) === String(session.id);
                        return `
                            <div class="msg ${isMe ? 'msg-sent' : 'msg-received'}">
                                <div class="d-flex justify-content-between align-items-center mb-1 mb-1" style="gap:20px">
                                    <span class="fw-bold" style="font-size:0.65rem">${isMe ? 'Me' : (m.senderName || 'Admin')}</span>
                                    <span style="font-size:0.55rem; opacity:0.7">${new Date(m.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                                <div style="word-break: break-word;">${m.message}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="msg-input" placeholder="Ask a question or provide more info..." onkeypress="if(event.key==='Enter') sendMsg()">
                    <button class="btn-send" onclick="sendMsg()"><i class="bi bi-send-fill"></i></button>
                </div>
            `;
            const body = document.getElementById('chat-messages');
            body.scrollTop = body.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !activeChat) return;

            const ok = await CMS.sendMessage(activeChat.id, 'employee', session.role, text, session.fullName);
            if (ok) {
                input.value = '';
                await renderChatMain();
            } else {
                alert("Failed to send message. Please try again.");
            }
        }
    </script>
</body>
</html>
