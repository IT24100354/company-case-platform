<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Admin - CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="bg-light">

<nav class="sidebar">
    <div class="sidebar-brand">Company Admin</div>
    <div class="sidebar-nav">
        <a class="nav-link-item active" href="company-admin-dashboard.html"><i class="bi bi-building"></i> Overview</a>
        <a class="nav-link-item" href="login.html" onclick="sessionStorage.clear()" style="color:var(--clr-danger)"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="main-wrapper" style="margin-left: 260px; padding: 2rem;">
    <div class="header mb-4">
        <h2 id="companyHeader">Organization Dashboard</h2>
        <p class="text-muted">Manage complaints forwarded to your organization.</p>
    </div>

    <div class="cms-card">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Complaint Title</th>
                    <th>Type</th>
                    <th>Current Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="companyTable">
                <tr><td colspan="5" class="text-center">Loading cases...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="assets/data-store.js"></script>
<script>
    const session = CMS.requireAuth(['company_admin']);

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('companyHeader').innerText = session.companyName || 'Organization Dashboard';
        loadCompanyComplaints();
    });

    async function loadCompanyComplaints() {
        const res = await fetch(`/api/complaints?userId=${session.id}`);
        const data = await res.json();
        const tbody = document.getElementById('companyTable');
        tbody.innerHTML = data.length ? '' : '<tr><td colspan="5" class="text-center text-muted">No complaints forwarded yet.</td></tr>';

        data.forEach(c => {
             tbody.innerHTML += `
                <tr>
                    <td>#${c.id}</td>
                    <td>${c.title}</td>
                    <td>${c.complainantType}</td>
                    <td><span class="badge" style="background:#0d6efd">${c.status}</span></td>
                    <td><button class="btn btn-sm btn-outline-primary">Process</button></td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
