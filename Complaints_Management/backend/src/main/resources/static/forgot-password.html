<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        :root {
            --clr-primary: #2563eb;
            --clr-bg: #f8fafc;
            --clr-surface: #ffffff;
            --clr-border: #e2e8f0;
            --clr-text: #1e293b;
            --clr-muted: #64748b;
            --clr-danger: #e11d48;
            --clr-success: #16a34a;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--clr-bg);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 20px;
        }
        .reset-card {
            max-width: 440px;
            width: 100%;
            padding: 2.5rem;
            border-radius: 20px;
            background: var(--clr-surface);
            box-shadow: var(--shadow);
            border: 1px solid var(--clr-border);
        }
        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--clr-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--clr-muted);
            margin: 0 auto 1.5rem;
            border: 2px solid var(--clr-border);
        }
        .step-active {
            background: var(--clr-primary);
            color: #fff;
            border-color: var(--clr-primary);
        }
        .form-control-cms {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--clr-border);
            outline: none;
            transition: all 0.2s;
        }
        .form-control-cms:focus { border-color: var(--clr-primary); box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        .btn-cms {
            background: var(--clr-primary);
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 10px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: 0.2s;
        }
        .btn-cms:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-cms:disabled { background: #94a3b8; cursor: not-allowed; }
        .alert { padding: 0.75rem 1rem; border-radius: 10px; font-size: 0.85rem; margin-bottom: 1.5rem; display: none; }
    </style>
</head>
<body>

    <div class="reset-card">
        <div id="stepHeader">
            <div class="step-circle step-active" id="stepIndicator">1</div>
            <h3 class="text-center fw-bold mb-1" id="title">Identify Account</h3>
            <p class="text-center text-muted small mb-4" id="subtitle">Enter your username to begin the recovery</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <!-- Step 1: Username -->
        <div id="formStep1">
            <div class="mb-3">
                <label class="form-label fw-bold small">Username</label>
                <input type="text" id="username" class="form-control-cms" placeholder="e.g. braveena" required>
            </div>
            <button onclick="sendOtp()" id="btnStep1" class="btn-cms">Send Verification Code</button>
        </div>

        <!-- Step 2: OTP -->
        <div id="formStep2" style="display:none">
            <div class="mb-3">
                <label class="form-label fw-bold small text-center d-block">4-Digit Verification Code</label>
                <div class="d-flex justify-content-center gap-2">
                    <input type="text" maxlength="4" id="otp" class="form-control-cms text-center fs-4 fw-bold" style="width: 160px; letter-spacing: 8px;" placeholder="0000">
                </div>
            </div>
            <button onclick="verifyOtp()" id="btnStep2" class="btn-cms">Verify & Proceed</button>
        </div>

        <!-- Step 3: New Password -->
        <div id="formStep3" style="display:none">
            <div class="mb-3">
                <label class="form-label fw-bold small">New Password</label>
                <input type="password" id="newPass" class="form-control-cms" placeholder="Enter new password">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold small">Confirm Password</label>
                <input type="password" id="confirmPass" class="form-control-cms" placeholder="Confirm new password">
            </div>
            <button onclick="resetPassword()" id="btnStep3" class="btn-cms">Change Password</button>
        </div>

        <div class="mt-4 text-center">
            <a href="login.html" class="text-decoration-none small fw-bold" style="color:var(--clr-muted)"><i class="bi bi-arrow-left"></i> Back to Login</a>
        </div>
    </div>

    <script>
        let currentStep = 1;

        function showAlert(msg, type = 'danger') {
            const box = document.getElementById('alertBox');
            box.style.display = 'block';
            box.textContent = msg;
            box.className = `alert alert-${type === 'danger' ? 'danger' : 'success'}`;
        }

        async function sendOtp() {
            const username = document.getElementById('username').value.trim();
            if (!username) return showAlert("Please enter your username.");

            const btn = document.getElementById('btnStep1');
            btn.disabled = true;
            btn.textContent = "Checking...";

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username })
                });
                const data = await res.json();
                if (res.ok) {
                    currentStep = 2;
                    document.getElementById('formStep1').style.display = 'none';
                    document.getElementById('formStep2').style.display = 'block';
                    document.getElementById('stepIndicator').textContent = '2';
                    document.getElementById('title').textContent = 'Verify Identity';
                    document.getElementById('subtitle').textContent = "OTP sent to your email account";
                    showAlert("Check your email for the 4-digit code.", "success");
                } else {
                    showAlert(data.message || "Failed to identify account.");
                }
            } catch (e) {
                showAlert("Connection error.");
            } finally {
                btn.disabled = false;
                btn.textContent = "Send Verification Code";
            }
        }

        async function verifyOtp() {
            const otp = document.getElementById('otp').value.trim();
            const username = document.getElementById('username').value.trim();
            if (otp.length !== 4) return showAlert("Please enter the 4-digit code.");

            const btn = document.getElementById('btnStep2');
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, otp })
                });
                const data = await res.json();
                if (res.ok) {
                    currentStep = 3;
                    document.getElementById('formStep2').style.display = 'none';
                    document.getElementById('formStep3').style.display = 'block';
                    document.getElementById('stepIndicator').textContent = '3';
                    document.getElementById('title').textContent = 'Reset Password';
                    document.getElementById('subtitle').textContent = "Set a secure new password";
                    document.getElementById('alertBox').style.display = 'none';
                } else {
                    showAlert(data.message || "Invalid or expired OTP.");
                }
            } catch (e) {
                showAlert("Connection error.");
            } finally {
                btn.disabled = false;
            }
        }

        async function resetPassword() {
            const pass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;
            const otp = document.getElementById('otp').value;
            const username = document.getElementById('username').value;

            if (pass.length < 6) return showAlert("Password must be at least 6 characters.");
            if (pass !== confirm) return showAlert("Passwords do not match.");

            const btn = document.getElementById('btnStep3');
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, otp, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    showAlert("Password changed! Redirecting...", "success");
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showAlert(data.message || "Reset failed.");
                }
            } catch (e) {
                showAlert("Connection error.");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
