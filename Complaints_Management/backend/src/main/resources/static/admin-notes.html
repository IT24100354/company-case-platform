<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internal Notes – CMS Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
    <style>
        .note-card {
            border: 1px solid var(--clr-border);
            border-radius: 12px;
            background: var(--clr-surface);
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: all .2s;
        }

        .note-card:hover {
            box-shadow: 0 4px 12px rgba(0, 0, 0, .05);
            border-color: rgba(37, 99, 235, .3);
        }

        .visibility-badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-weight: 600;
        }

        .vis-single {
            background: rgba(124, 58, 237, 0.1);
            color: #7c3aed;
        }

        .vis-company {
            background: rgba(37, 99, 235, 0.1);
            color: #2563eb;
        }
    </style>
</head>

<body>

    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon"><i class="bi bi-shield-check"></i></div>
            CMS Admin
        </div>
        <div class="sidebar-nav">
            <div class="nav-section-label">Overview</div>
            <a class="nav-link-item" href="admin-dashboard.html"><i class="bi bi-grid"></i> Dashboard</a>
            
            <div class="nav-section-label">Internal</div>
            <a class="nav-link-item active" href="admin-notes.html"><i class="bi bi-journal-text"></i> Internal Notes</a>

            <div class="nav-section-label">Account</div>
            <a class="nav-link-item" href="login.html" onclick="CMS.logout()" style="color:var(--clr-danger)">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </nav>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="d-flex align-items-center gap-2">
                <span class="topbar-title">Internal Assignments & Notes</span>
            </div>
            <div class="topbar-right">
                <div class="d-flex align-items-center gap-2" style="cursor:pointer">
                    <div id="topbar-avatar"
                        style="width:34px;height:34px;border-radius:50%;background:var(--clr-primary);display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#fff;font-weight:700"
                        title="Admin Profile">A</div>
                    <span id="topbar-name" style="font-size:.875rem;font-weight:600">Admin</span>
                </div>
            </div>
        </header>

        <main class="page-content">
            <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
                <div>
                    <h2 style="font-size:1.25rem;font-weight:700;margin:0">Internal Notes</h2>
                    <p class="text-muted-cms" style="font-size:.85rem;margin:0">View instructions from Super Admin or create your own internal notes.</p>
                </div>
                <button class="btn-cms btn-primary-cms" onclick="openCreateModal()"><i class="bi bi-plus-lg me-1"></i> Create Note</button>
            </div>

            <!-- Notes List -->
            <div id="notes-container">
                <div class="text-center py-5 text-muted-cms">
                    <div class="spinner-border text-primary mb-3"></div>
                    <div>Loading notes…</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Note Modal -->
    <div class="modal fade" id="createNoteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-journal-plus me-2 text-primary"></i> Create Internal Note</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="create-note-form" onsubmit="handleCreateNote(event)">
                        <div class="cms-form-group mb-3">
                            <label class="cms-label">Complaint ID <span class="text-danger">*</span></label>
                            <input type="number" id="note-complaintId" class="cms-input" placeholder="e.g. 1" required />
                        </div>
                        <div class="cms-form-group mb-3">
                            <label class="cms-label">Title <span class="text-danger">*</span></label>
                            <input type="text" id="note-title" class="cms-input" placeholder="Note title" required />
                        </div>
                        <div class="cms-form-group mb-3">
                            <label class="cms-label">Message <span class="text-danger">*</span></label>
                            <textarea id="note-message" class="cms-textarea" rows="4" placeholder="Private internal message..." required></textarea>
                        </div>
                        <div class="text-end mt-4">
                            <button type="button" class="btn-cms btn-outline-cms me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn-cms btn-primary-cms" id="save-note-btn"><i class="bi bi-check-circle me-1"></i> Save Note</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/data-store.js"></script>
    <script>
        const session = CMS.requireAuth(['admin']);
        if (!session) window.location.href = 'login.html';
        
        document.getElementById('topbar-name').textContent = session.fullName || session.name || 'Admin';
        loadNotes();

        async function loadNotes() {
            try {
                const res = await fetch(`/api/admin/notes/my?username=${encodeURIComponent(session.username)}&role=ADMIN`);
                if (!res.ok) throw new Error('Failed to load notes');
                const notes = await res.json();
                renderNotes(notes);
            } catch (err) {
                document.getElementById('notes-container').innerHTML = `<div class="text-center py-5 text-danger"><i class="bi bi-exclamation-triangle" style="font-size:2rem"></i><p class="mt-2 text-danger">Failed to load internal notes.</p></div>`;
            }
        }

        function renderNotes(notes) {
            const container = document.getElementById('notes-container');
            if (notes.length === 0) {
                container.innerHTML = `<div class="text-center py-5 text-muted-cms" style="background:var(--clr-surface);border-radius:12px;border:1px dashed var(--clr-border)"><i class="bi bi-journal-x" style="font-size:3rem"></i><p class="mt-3">No internal assignments or notes found.</p></div>`;
                return;
            }

            container.innerHTML = notes.map(n => `
                <div class="note-card">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <h5 style="font-size:1.1rem;font-weight:700;margin:0" class="text-primary">${n.title}</h5>
                            <a href="admin-complaint-detail.html?id=${n.complaintId}" class="text-decoration-none" style="font-size:.85rem;font-weight:600;color:var(--clr-muted)"><i class="bi bi-link-45deg"></i> Complaint #${n.complaintId}</a>
                        </div>
                        <span class="visibility-badge ${n.visibilityType === 'SINGLE_ADMIN' ? 'vis-single' : 'vis-company'}">
                            ${n.visibilityType === 'SINGLE_ADMIN' ? 'Private Instruction' : 'Company Assignment'}
                        </span>
                    </div>
                    <p style="font-size:.9rem;color:var(--clr-text);white-space:pre-wrap;margin-bottom:1rem">${n.message}</p>
                    <div class="d-flex justify-content-between align-items-center" style="font-size:.75rem;color:var(--clr-muted)">
                        <span>By: ${n.createdBy === session.username ? 'Me' : n.createdBy}</span>
                        <span><i class="bi bi-clock me-1"></i> ${new Date(n.createdAt).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }

        function openCreateModal() {
            document.getElementById('create-note-form').reset();
            new bootstrap.Modal(document.getElementById('createNoteModal')).show();
        }

        async function handleCreateNote(e) {
            e.preventDefault();
            const btn = document.getElementById('save-note-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving...';

            const compId = document.getElementById('note-complaintId').value.trim();
            const payload = {
                title: document.getElementById('note-title').value.trim(),
                message: document.getElementById('note-message').value.trim(),
                visibilityType: 'SINGLE_ADMIN',
                assignedAdminId: session.username,
                createdBy: session.username
            };

            try {
                const res = await fetch(`/api/super-admin/complaints/${compId}/notes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    showToast('Note saved successfully', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('createNoteModal')).hide();
                    loadNotes();
                } else {
                    const data = await res.json();
                    showToast(data.message || 'Error saving note', 'error');
                }
            } catch (err) {
                showToast('Server error', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-check-circle me-1"></i> Save Note';
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `toast-item toast-${type}`;
            el.innerHTML = `<span>${message}</span>`;
            container.appendChild(el);
            setTimeout(() => { el.style.animation = 'fadeOut 0.3s ease forwards'; setTimeout(() => el.remove(), 300); }, 4000);
        }

        loadNotes();
    </script>
</body>
</html>
