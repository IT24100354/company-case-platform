<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Portal - CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/styles.css">
    <style>
        .status-badge { padding: 4px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
        .badge-forwarded { background: #fef3c7; color: #92400e; }
        .badge-inprogress { background: #e0f2fe; color: #075985; }
        .badge-resolutionsent { background: #f3e8ff; color: #6b21a8; }
        .badge-resolved { background: #ecfdf5; color: #065f46; }
    </style>
</head>
<body class="bg-light">
<div id="toast-container"></div>

<nav class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon" style="background:var(--clr-success)"><i class="bi bi-gear-fill"></i></div>
        <span>Dept Portal</span>
    </div>
    <div class="sidebar-nav">
        <div class="nav-section-label">Operations</div>
        <a class="nav-link-item active" href="department-dashboard.html"><i class="bi bi-list-task"></i> Assigned Tasks</a>
        <a class="nav-link-item" href="communication.html"><i class="bi bi-chat-dots"></i> Messaging</a>
        
        <div class="nav-section-label">Account</div>
        <a class="nav-link-item text-danger" href="login.html" onclick="sessionStorage.clear()"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="main-wrapper" style="margin-left: 260px; padding: 24px;">
    <div class="header mb-4">
        <div class="d-flex justify-content-between align-items-end">
            <div>
                <h2 class="fw-bold mb-1" id="deptHeader">Department Tasks</h2>
                <p class="text-muted" id="deptSub">Managing resolutions for organization.</p>
            </div>
            <div class="text-end">
                <span class="badge bg-white text-dark border p-2 mb-2" id="companyTag"></span>
            </div>
        </div>
    </div>

    <div class="cms-card p-0 overflow-hidden">
        <div class="p-3 border-bottom d-flex justify-content-between">
            <span class="fw-bold">Resolution Tasks</span>
            <button class="btn btn-sm btn-link text-decoration-none" onclick="loadTasks()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Case ID</th>
                        <th>Complaint</th>
                        <th>Status</th>
                        <th>Forwarded Date</th>
                        <th class="text-end">Action</th>
                    </tr>
                </thead>
                <tbody id="deptTable">
                    <tr><td colspan="5" class="text-center py-5">Loading tasks...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Resolution Modal -->
<div class="modal fade" id="resolveModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border-radius:16px;">
            <form onsubmit="submitResolution(event)">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Submit Final Resolution</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="resolveCaseId">
                    <div class="mb-3 p-3 bg-light rounded-3">
                        <div class="fw-bold mb-1" id="resolveCaseTitle">Case Title</div>
                        <div class="small text-muted" id="resolveCaseDesc">Description...</div>
                    </div>
                    <div class="mb-3">
                        <label class="cms-label">Resolution Title</label>
                        <input type="text" id="resTitle" class="cms-input" placeholder="Summarize the fix" required>
                    </div>
                    <div class="mb-3">
                        <label class="cms-label">Correction Steps / Explanation</label>
                        <textarea id="resDesc" class="cms-textarea" rows="4" placeholder="Detail how the issue was resolved" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="cms-label">Supplementary Files (Optional)</label>
                        <input type="file" id="resFiles" class="form-control" multiple>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success px-4">Send Resolution</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="assets/data-store.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const session = CMS.requireAuth(['dept_user']);
    let tasks = [];

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('deptHeader').innerText = session.department || 'Department Tasks';
        document.getElementById('companyTag').innerText = session.companyName;
        loadTasks();
    });

    async function loadTasks() {
        const res = await fetch(`/api/complaints?userId=${session.id}`);
        tasks = await res.json();
        const tbody = document.getElementById('deptTable');
        
        if (!tasks.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">No tasks assigned.</td></tr>';
            return;
        }

        tbody.innerHTML = tasks.map(t => {
            return `
                <tr>
                    <td><span class="fw-bold">CMP-${String(t.id).padStart(3, '0')}</span></td>
                    <td>
                        <div class="fw-semibold">${t.title}</div>
                        <small class="text-muted">${t.category || 'General'}</small>
                    </td>
                    <td>${CMS.statusBadge(t.status)}</td>
                    <td class="small text-muted">${CMS.fmtDate(t.createdAt)}</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-primary" onclick="viewTask(${t.id})">View & Process</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    async function viewTask(id) {
        // Marks status as IN_PROGRESS in backend
        const res = await fetch(`/api/complaints/${id}?userId=${session.id}`);
        const c = await res.json();
        
        document.getElementById('resolveCaseId').value = c.id;
        document.getElementById('resolveCaseTitle').innerText = c.title;
        document.getElementById('resolveCaseDesc').innerText = c.description;
        
        new bootstrap.Modal(document.getElementById('resolveModal')).show();
        loadTasks(); // Update list to show IN_PROGRESS
    }

    async function submitResolution(e) {
        e.preventDefault();
        const formData = new FormData();
        formData.append('complaintId', document.getElementById('resolveCaseId').value);
        formData.append('title', document.getElementById('resTitle').value);
        formData.append('description', document.getElementById('resDesc').value);
        formData.append('userId', session.id);
        
        const files = document.getElementById('resFiles').files;
        if (files.length > 0) {
            formData.append('file', files[0]); // Current API supports one file per resolution
        }

        const res = await fetch('/api/resolutions', {
            method: 'POST',
            body: formData
        });

        if (res.ok) {
            bootstrap.Modal.getInstance(document.getElementById('resolveModal')).hide();
            showToast('Resolution sent for approval.', 'success');
            loadTasks();
            e.target.reset();
        } else {
            showToast('Failed to send resolution.', 'error');
        }
    }
</script>
</body>
</html>
