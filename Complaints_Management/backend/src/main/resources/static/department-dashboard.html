<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Portal - CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="bg-light">

<nav class="sidebar">
    <div class="sidebar-brand">Dept Portal</div>
    <div class="sidebar-nav">
        <a class="nav-link-item active" href="department-dashboard.html"><i class="bi bi-gear"></i> Assigned Tasks</a>
        <a class="nav-link-item" href="login.html" onclick="sessionStorage.clear()" style="color:var(--clr-danger)"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="main-wrapper" style="margin-left: 260px; padding: 2rem;">
    <div class="header mb-4">
        <h2 id="deptHeader">Department Tasks</h2>
        <p class="text-muted" id="deptSub">Monitoring incoming resolutions.</p>
    </div>

    <div class="cms-card">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Task ID</th>
                    <th>Complaint</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="deptTable">
                <tr><td colspan="5" class="text-center">Loading department tasks...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="assets/data-store.js"></script>
<script>
    const session = CMS.requireAuth(['dept_user']);

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('deptHeader').innerText = session.department || 'Department Tasks';
        document.getElementById('deptSub').innerText = `Managing tasks for ${session.companyName}`;
        loadDeptTasks();
    });

    async function loadDeptTasks() {
        const res = await fetch(`/api/complaints?userId=${session.id}`);
        const data = await res.json();
        const tbody = document.getElementById('deptTable');
        tbody.innerHTML = data.length ? '' : '<tr><td colspan="5" class="text-center text-muted">No tasks assigned to your department.</td></tr>';

        data.forEach(c => {
             tbody.innerHTML += `
                <tr>
                    <td>#${c.id}</td>
                    <td>${c.title}</td>
                    <td><span class="badge bg-warning text-dark">MEDIUM</span></td>
                    <td><span class="badge bg-info">${c.status}</span></td>
                    <td><button class="btn btn-sm btn-primary">Submit Resolution</button></td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
