<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Details - CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/styles.css">
    <style>
        .details-container { max-width: 900px; margin: 40px auto; }
        .info-card { background: #fff; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .status-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .field-label { font-size: 0.85rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .field-value { font-size: 1.05rem; color: #1e293b; margin-top: 4px; }
        .evidence-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 15px; }
        .evidence-card { border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.2s; background: #f8fafc; }
        .evidence-card:hover { transform: translateY(-2px); border-color: #2563eb; }
        .evidence-icon { font-size: 1.5rem; color: #64748b; }
    </style>
</head>
<body class="bg-light">

<div class="container details-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <button class="btn btn-white border shadow-sm" style="border-radius:10px" onclick="goBack()">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </button>
        <div class="d-flex gap-2" id="action-buttons">
            <!-- Buttons via JS -->
        </div>
    </div>

    <div class="info-card">
        <div class="status-header">
            <h2 class="mb-0" id="c-title">Loading...</h2>
            <div id="status-badge"></div>
        </div>
        
        <p class="text-muted small mb-4">Complaint Reference: <span class="fw-bold text-primary" id="c-ref">#---</span> | Submitted on <span id="c-date">---</span></p>

        <div class="row g-4">
            <div class="col-md-12">
                <div class="field-label">Description</div>
                <div class="field-value" id="c-desc" style="white-space: pre-wrap;">...</div>
            </div>

            <div class="col-md-4">
                <div class="field-label">Category</div>
                <div class="field-value" id="c-cat">...</div>
            </div>

            <div class="col-md-4">
                <div class="field-label">Company</div>
                <div class="field-value" id="c-company">...</div>
            </div>

            <div class="col-md-4">
                <div class="field-label">Department</div>
                <div class="field-value" id="c-dept">...</div>
            </div>

            <div class="col-12 mt-5">
                <h5 class="fw-bold"><i class="bi bi-paperclip"></i> Attached Evidence</h5>
                <div class="evidence-grid" id="evidence-container">
                    <p class="text-muted small">Loading attachments...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="assets/data-store.js"></script>
<script>
    const session = CMS.requireAuth(['customer', 'employee']);
    const params = new URLSearchParams(window.location.search);
    const complaintId = params.get('id');

    if (!complaintId) {
        alert("No complaint ID provided.");
        goBack();
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadComplaintData();
    });

    function goBack() {
        if (session.role === 'EMPLOYEE') window.location.href = 'employee-dashboard.html';
        else window.location.href = 'customer-dashboard.html';
    }

    async function loadComplaintData() {
        try {
            const resp = await fetch(`/api/complaints/${complaintId}?userId=${session.id}`);
            if (!resp.ok) throw new Error("Could not load complaint details");
            const c = await resp.json();

            document.getElementById('c-title').textContent = c.title;
            document.getElementById('c-ref').textContent = `#${c.id}`;
            document.getElementById('c-date').textContent = new Date(c.createdAt).toLocaleString();
            document.getElementById('c-desc').textContent = c.description;
            document.getElementById('c-cat').textContent = c.category || 'General';
            document.getElementById('c-company').textContent = c.companyName || 'N/A';
            document.getElementById('c-dept').textContent = c.department || 'General';
            document.getElementById('status-badge').innerHTML = CMS.statusBadge(c.status);

            const actions = document.getElementById('action-buttons');
            // Always show Communication button
            actions.innerHTML = `
                <button class="btn btn-white border shadow-sm" style="border-radius:10px" onclick="window.location.href='communication.html?id=${complaintId}'">
                    <i class="bi bi-chat-dots me-1"></i> Messages
                </button>
            `;

            // If PENDING, show Edit button
            if (c.status === 'PENDING') {
                actions.innerHTML += `
                    <button class="btn btn-primary shadow-sm" style="border-radius:10px" onclick="window.location.href='complaint-form.html?editId=${complaintId}'">
                        <i class="bi bi-pencil-square me-1"></i> Edit Complaint
                    </button>
                `;
            }

            loadEvidence();
        } catch (e) {
            console.error(e);
            alert(e.message);
        }
    }

    async function loadEvidence() {
        const container = document.getElementById('evidence-container');
        try {
            const resp = await fetch(`/api/admin/complaints/${complaintId}/evidence?userId=${session.id}`);
            if (resp.ok) {
                const list = await resp.json();
                if (list.length === 0) {
                    container.innerHTML = '<p class="text-muted small italic">No evidence attached.</p>';
                    return;
                }
                container.innerHTML = list.map(ev => {
                    let icon = 'bi-file-earmark';
                    if (ev.fileType.includes('image')) icon = 'bi-file-earmark-image';
                    else if (ev.fileType.includes('pdf')) icon = 'bi-file-earmark-pdf';
                    else if (ev.fileType.includes('video')) icon = 'bi-file-earmark-play';
                    
                    return `
                        <a href="${ev.filePath}" target="_blank" class="evidence-card text-decoration-none text-dark">
                            <i class="bi ${icon} evidence-icon"></i>
                            <span class="small fw-semibold text-truncate w-100 text-center">${ev.fileName}</span>
                            <span class="text-muted" style="font-size:0.65rem">Click to view</span>
                        </a>
                    `;
                }).join('');
            }
        } catch (e) {
            container.innerHTML = '<p class="text-danger small">Failed to load evidence.</p>';
        }
    }
</script>
</body>
</html>
