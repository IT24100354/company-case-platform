<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome! – CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--clr-bg);
            background-image: radial-gradient(circle at center, rgba(37, 99, 235, 0.08), transparent 600px);
        }

        .welcome-card {
            max-width: 480px;
            width: 100%;
            padding: 3rem 2.5rem;
            border-radius: 20px;
            text-align: center;
        }

        .confetti-icon {
            font-size: 3rem;
            color: #fbbf24;
            margin-bottom: 1rem;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>

    <div class="cms-card welcome-card shadow-sm">
        <i class="bi bi-stars confetti-icon"></i>

        <h1 class="fw-bold mb-3" style="font-size:1.75rem">Welcome <span id="welcome-name"></span>!</h1>

        <div style="font-size:1rem;color:var(--clr-text);line-height:1.75;margin-bottom:2rem">
            We warmly welcome you to join our<br>
            <strong>Complaint Management Platform</strong> team.<br><br>
            Together we aim to ensure fair,<br>
            transparent and effective complaint handling.
        </div>

        <a href="admin-dashboard.html"
            class="btn-cms btn-primary-cms w-100 py-3 d-flex justify-content-center align-items-center gap-2"
            style="font-size:1.05rem;border-radius:12px">
            Continue to Dashboard <i class="bi bi-rocket me-1"></i>
        </a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let name = urlParams.get('name');
        if (!name) name = 'Admin';
        document.getElementById('welcome-name').textContent = name;
    </script>
</body>

</html>
