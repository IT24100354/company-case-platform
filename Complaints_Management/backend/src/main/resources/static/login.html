<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --clr-primary: #2563eb;
            --clr-bg: #f8fafc;
            --clr-surface: #ffffff;
            --clr-border: #e2e8f0;
            --clr-text: #1e293b;
            --clr-muted: #64748b;
            --clr-danger: #e11d48;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- Background Blobs (Static) --- */
        .bg-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(124,58,237,0.1));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }
        .blob-1 { top: -100px; left: -100px; }
        .blob-2 { bottom: -100px; right: -100px; }

        /* --- Card Animation --- */
        @keyframes cardEntrance {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .login-card {
            max-width: 440px;
            width: 90%;
            padding: 2.5rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--clr-primary), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-align: center;
            letter-spacing: -1px;
        }

        .logo-wrap {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--clr-primary), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem;
            color: #fff;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            font-weight: 700;
        }

        .role-badge {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: .85rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* Specific Role Styles */
        .badge-super_admin { background: #fff1f2; color: #e11d48; border: 1px solid #fda4af; }
        .badge-admin { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        .badge-company_admin { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .badge-dept_user { background: #faf5ff; color: #7c3aed; border: 1px solid #e9d5ff; }
        .badge-customer { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
        .badge-employee { background: #f0f9ff; color: #0891b2; border: 1px solid #bae6fd; }

        .form-control-cms {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--clr-border);
            outline: none;
            transition: all 0.2s;
            background: #fbfcfd;
        }
        .form-control-cms:focus { 
            border-color: var(--clr-primary); 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background: #fff;
        }
        .btn-login {
            background: linear-gradient(135deg, var(--clr-primary), #1d4ed8);
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 10px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .alert-error {
            background: #fef2f2;
            color: #b91c1c;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            border: 1px solid #fee2e2;
        }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="login-card">
        <div class="logo-wrap">CMS</div>
        <h2 class="text-center fw-bold mb-1" style="color:var(--clr-text)">Sign In</h2>
        <p class="text-center text-muted small mb-4">Complaint Management System</p>
        
        <div id="roleBadge" class="role-badge" style="display:none"></div>
        <div id="loginError" class="alert-error"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label class="form-label fw-semibold mb-1" style="font-size:0.85rem">Username</label>
                <div class="position-relative">
                    <i class="bi bi-person position-absolute" style="left:12px; top:50%; transform:translateY(-50%); color:var(--clr-muted)"></i>
                    <input type="text" id="username" class="form-control-cms" style="padding-left:2.5rem" placeholder="Username" required oninput="detectRole()">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold mb-1" style="font-size:0.85rem">Password</label>
                <div class="position-relative">
                    <i class="bi bi-key position-absolute" style="left:12px; top:50%; transform:translateY(-50%); color:var(--clr-muted)"></i>
                    <input type="password" id="password" class="form-control-cms" style="padding-left:2.5rem; padding-right:2.5rem" placeholder="Password" required>
                    <i class="bi bi-eye position-absolute" id="togglePassword" style="right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--clr-muted)"></i>
                </div>
                <div class="mt-2 text-end">
                    <a href="forgot-password.html" class="text-decoration-none small fw-semibold" style="color:var(--clr-primary)">Forgot Password?</a>
                </div>
            </div>
            <button type="submit" id="loginBtn" class="btn-login">Log In</button>
            
            <div class="d-flex align-items-center my-3">
                <hr class="flex-grow-1">
                <span class="mx-3 text-muted small fw-bold">OR</span>
                <hr class="flex-grow-1">
            </div>

            <!-- Real Google Sign-In Widget -->
            <div id="g_id_onload"
                 data-client_id="275638293160-fbnt7thi76uqtc50cg3bqluau2dpmfpf.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="370">
            </div>
        </form>

        <div class="mt-4 text-center">
            <p class="small text-muted mb-0">Don't have an account? <a href="register.html" class="text-decoration-none fw-bold" style="color:var(--clr-primary)">Register Now</a></p>
        </div>
    </div>

    <script>
        // Password Toggle
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        async function detectRole() {
            const username = document.getElementById('username').value.trim();
            const badge = document.getElementById('roleBadge');
            if (!username) { badge.style.display = 'none'; return; }

            try {
                const res = await fetch(`/api/auth/identify?username=${username}`);
                if (res.ok) {
                    const data = await res.json();
                    const role = data.role.toLowerCase();
                    badge.style.display = 'flex';
                    badge.className = `role-badge badge-${role}`;

                    const config = {
                        super_admin: { icon: 'shield-check', text: 'Super Administrator Account' },
                        admin: { icon: 'person-badge', text: 'Admin Account' },
                        company_admin: { icon: 'building', text: 'Company Admin Account' },
                        dept_user: { icon: 'people', text: 'Department' },
                        customer: { icon: 'person', text: 'Public Customer' },
                        employee: { icon: 'briefcase', text: 'Corporate Employee' }
                    };

                    const cfg = config[role] || { icon: 'question-circle', text: 'Identify Account' };
                    badge.innerHTML = `<i class="bi bi-${cfg.icon}"></i> ${cfg.text}`;
                } else {
                    badge.style.display = 'none';
                }
            } catch (e) {
                badge.style.display = 'none';
            }
        }

        async function handleCredentialResponse(response) {
            const err = document.getElementById('loginError');
            err.style.display = 'none';

            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                if (res.ok) {
                    const sessionData = await res.json();
                    sessionStorage.setItem('cms_session', JSON.stringify(sessionData));
                    finalizeLogin(sessionData.role);
                } else {
                    const data = await res.json();
                    err.innerText = data.message || 'Google account not recognized.';
                    err.style.display = 'block';
                }
            } catch (e) {
                err.innerText = 'Server connection error.';
                err.style.display = 'block';
            }
        }

        function finalizeLogin(role) {
            const routes = {
                 SUPER_ADMIN: 'super-admin-dashboard.html',
                 ADMIN: 'admin-dashboard.html',
                 COMPANY_ADMIN: 'company-admin-dashboard.html',
                 DEPT_USER: 'department-dashboard.html',
                 CUSTOMER: 'customer-dashboard.html',
                 EMPLOYEE: 'employee-dashboard.html'
            };
            window.location.href = routes[role.toUpperCase()] || 'login.html';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');
            btn.disabled = true;
            btn.innerText = 'Loging in...';
            err.style.display = 'none';

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const sessionData = await res.json();
                    sessionStorage.setItem('cms_session', JSON.stringify(sessionData));
                    finalizeLogin(sessionData.role);
                } else {
                    err.innerText = 'Invalid username or password.';
                    err.style.display = 'block';
                }
            } catch (error) {
                err.innerText = 'Server connection error.';
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Log In';
            }
        }
    </script>
</body>
</html>
