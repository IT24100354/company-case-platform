<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – CMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--clr-bg);
            background-image: radial-gradient(var(--clr-border) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .login-card {
            max-width: 440px;
            width: 100%;
            padding: 3rem 2.5rem;
            border-radius: 16px;
            background: var(--clr-surface);
            box-shadow: var(--shadow);
            border: 1px solid var(--clr-border);
        }

        .logo-wrap {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--clr-primary), var(--clr-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.75rem;
            color: #fff;
        }

        .role-indicator {
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-size: .8rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }

        .role-admin {
            background: rgba(37, 99, 235, .12);
            color: var(--clr-primary);
            border: 1px solid rgba(37, 99, 235, .3);
        }

        .role-super_admin {
            background: rgba(225, 29, 72, .12);
            color: #e11d48;
            border: 1px solid rgba(225, 29, 72, .3);
        }

        .show-password-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--clr-muted);
            cursor: pointer;
            padding: 0;
            font-size: 1rem;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo-wrap"><i class="bi bi-shield-lock"></i></div>
        <h1 class="text-center fw-bold mb-1" style="font-size:1.5rem; color:var(--clr-text)">Welcome Back</h1>
        <p class="text-center text-muted-cms mb-4" style="font-size:.9rem">Sign in to your account</p>

        <div id="role-indicator" class="role-indicator"></div>
        <div id="login-error" class="cms-alert cms-alert-danger mb-3" style="display:none">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span id="login-error-msg">Invalid username or password.</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
            <div class="cms-form-group mb-3">
                <label class="cms-label" for="username">Username</label>
                <div class="position-relative">
                    <i class="bi bi-person position-absolute"
                        style="left:14px;top:50%;transform:translateY(-50%);color:var(--clr-muted)"></i>
                    <input type="text" id="username" class="cms-input" style="padding-left:2.5rem"
                        placeholder="Enter your username" required oninput="detectRole()" />
                </div>
                <div class="invalid-feedback-msg" id="username-err">Username is required.</div>
            </div>

            <div class="cms-form-group mb-4">
                <label class="cms-label d-flex justify-content-between" for="password">
                    Password
                    <a href="forgot-password.html" class="text-decoration-none"
                        style="color:var(--clr-primary);font-size:.75rem;font-weight:600;text-transform:none;letter-spacing:normal">Forgot
                        Password?</a>
                </label>
                <div class="position-relative">
                    <i class="bi bi-key position-absolute"
                        style="left:14px;top:50%;transform:translateY(-50%);color:var(--clr-muted)"></i>
                    <input type="password" id="password" class="cms-input"
                        style="padding-left:2.5rem;padding-right:2.5rem" placeholder="Enter your password" required />
                    <button type="button" class="show-password-btn" onclick="togglePwd()">
                        <i class="bi bi-eye" id="eye-icon"></i>
                    </button>
                </div>
                <div class="invalid-feedback-msg" id="password-err">Password is required.</div>
            </div>

            <button type="submit" id="login-btn"
                class="btn-cms btn-primary-cms w-100 py-2 d-flex justify-content-center align-items-center gap-2 mb-4"
                style="font-size:1rem">
                Log In <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <div class="text-center"
            style="font-size:.85rem; color:var(--clr-muted); border-top: 1px solid var(--clr-border); padding-top:1.5rem">
            Don't have an account? <a href="register.html" class="text-decoration-none fw-semibold"
                style="color:var(--clr-primary)">Register here</a>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="assets/data-store.js"></script>
    <script>
        // Handle logout first
        const params = new URLSearchParams(window.location.search);
        if (params.get('logout') === 'true') {
            CMS.logout();
            // remove logout from URL to prevent infinite clear
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Redirect if already logged in
        const existing = CMS.getSession();
        if (existing) {
            if (existing.role === 'super_admin') window.location.href = 'super-admin-dashboard.html';
            else if (existing.role === 'admin') window.location.href = 'admin-dashboard.html';
        }


        function detectRole() {
            const username = document.getElementById('username').value.trim();
            const indicator = document.getElementById('role-indicator');
            if (!username) { indicator.style.display = 'none'; return; }

            const users = CMS.getAuthUsers();
            const user = users.find(u => u.username === username);
            if (user) {
                indicator.style.display = 'block';
                if (user.role === 'super_admin') {
                    indicator.className = 'role-indicator role-super_admin';
                    indicator.innerHTML = '<i class="bi bi-shield-lock me-2"></i>Super Administrator Account';
                } else if (user.role === 'admin') {
                    indicator.className = 'role-indicator role-admin';
                    indicator.innerHTML = '<i class="bi bi-person-badge me-2"></i>Administrator Account';
                }
            } else {
                indicator.style.display = 'none';
            }
        }

        function togglePwd() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const errorMsg = document.getElementById('login-error-msg');
            const btn = document.getElementById('login-btn');

            // Validate
            let valid = true;
            if (!username) {
                document.getElementById('username').classList.add('is-invalid');
                document.getElementById('username-err').classList.add('show');
                valid = false;
            } else {
                document.getElementById('username').classList.remove('is-invalid');
                document.getElementById('username-err').classList.remove('show');
            }
            if (!password) {
                document.getElementById('password').classList.add('is-invalid');
                document.getElementById('password-err').classList.add('show');
                valid = false;
            } else {
                document.getElementById('password').classList.remove('is-invalid');
                document.getElementById('password-err').classList.remove('show');
            }
            if (!valid) return;

            // Show loading
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Signing in…';
            btn.disabled = true;

            setTimeout(async () => {
                const session = await CMS.login(username, password);
                btn.innerHTML = 'Log In <i class="bi bi-arrow-right"></i>';
                btn.disabled = false;

                if (!session) {
                    errorMsg.textContent = 'Invalid username or password. Please try again.';
                    errorDiv.style.display = 'flex';
                    document.getElementById('password').value = '';
                    return;
                }

                errorDiv.style.display = 'none';

                // Route by role
                if (session.role === 'super_admin') {
                    showToast(`Welcome back, ${session.name}!`, 'success', 1500);
                    setTimeout(() => window.location.href = 'super-admin-dashboard.html', 1200);
                } else if (session.role === 'admin') {
                    if (session.firstLogin) {
                        // Mark first login done
                        CMS.updateUserProfile(session.id, { firstLogin: false });
                        // Notify super admin
                        CMS.addNotification({
                            role: 'super_admin',
                            type: 'admin_first_login',
                            title: '🟢 New Admin Active',
                            body: `${session.name} has logged in for the first time and has started working!`
                        });
                        setTimeout(() => window.location.href = `admin-welcome.html?name=${encodeURIComponent(session.name.split(' ')[0])}`, 1200);
                    } else {
                        showToast(`Welcome back, ${session.name}!`, 'success', 1500);
                        setTimeout(() => window.location.href = 'admin-dashboard.html', 1200);
                    }
                } else {
                    errorMsg.textContent = 'Your account does not have access to this portal.';
                    errorDiv.style.display = 'flex';
                    CMS.logout();
                }
            }, 800);
        }
    </script>
</body>

</html>
